{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passa ou Se Lasca — Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/jogo.css' %}">
</head>

<body>

    <!-- ════════════════════════════════════════
     TELA 0 — SETUP
════════════════════════════════════════ -->
    <div id="screen-setup">
        <div class="setup-card">
            <div class="setup-logo">
                <div class="setup-logo-icon">🃏</div>
                <strong>Passa ou Se Lasca</strong>
            </div>
            <div class="setup-deck">Preparando baralho: <span>{{ baralho.titulo }}</span></div>

            <!-- STEP 0: Modo de Jogo -->
            <div class="setup-section" id="step-0">
                <h3>Modo de Jogo</h3>
                <div class="mode-selector">
                    <button class="mode-btn" id="btn-modo-caos" onclick="selecionarModo('caos')">
                        <span class="mode-icon">🃏</span>
                        <span class="mode-title">Modo Caos</span>
                        <span class="mode-desc">Cartas normais + coringas (~30% coringas)</span>
                    </button>
                    <button class="mode-btn" id="btn-modo-normal" onclick="selecionarModo('normal')">
                        <span class="mode-icon">📋</span>
                        <span class="mode-title">Modo Normal</span>
                        <span class="mode-desc">Apenas cartas normais, sem coringas</span>
                    </button>
                </div>
            </div>

            <!-- STEP 1: Quantidade de equipes -->
            <div class="setup-section" id="step-1">
                <h3>Quantas equipes vão jogar?</h3>
                <div class="n-selector">
                    <button class="n-btn" data-n="2" onclick="selecionarN(2)">2</button>
                    <button class="n-btn" data-n="3" onclick="selecionarN(3)">3</button>
                    <button class="n-btn" data-n="4" onclick="selecionarN(4)">4</button>
                    <button class="n-btn" data-n="5" onclick="selecionarN(5)">5</button>
                    <button class="n-btn" data-n="6" onclick="selecionarN(6)">6</button>
                </div>
                <div id="qtd-cartas-info"
                    style="margin-top: 16px; font-size: 15px; font-weight: 600; color: var(--text-muted); background: white; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); display: flex; align-items: center; gap: 8px;">
                    <!-- Preenchido via JS -->
                </div>
            </div>

            <div class="setup-section" id="step-2">
                <h3>Defina o nome das equipes</h3>
                <div class="team-inputs" id="team-inputs">
                    <!-- gerado por JS -->
                </div>
            </div>

            <button class="btn-iniciar" id="btn-iniciar" onclick="iniciarJogo()" disabled>
                ▶ Começar Partida
            </button>
        </div>
    </div>

    <!-- ════════════════════════════════════════
     TELA 1 — JOGO
════════════════════════════════════════ -->
    <div id="screen-game" style="display:none;flex-direction:column">

        <div class="topbar" id="topbar">
            <button class="btn-topbar" data-url="{% url 'home' %}" onclick="tentarEncerrar(this)">✕ Encerrar</button>
            <div class="topbar-teams" id="topbar-teams"></div>
            <button class="btn-topbar" onclick="abrirModalEditarEquipes()">✏️ Editar Equipes</button>
        </div>

        <div class="mesa" id="mesa"></div>

    </div>

    <!-- ════════════════════════════════════════
     MODAL — EDITAR EQUIPES
════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-editar">
        <div class="modal-box" style="max-width:500px">
            <h3 style="font-size:24px;font-weight:900;margin-bottom:24px;color:var(--text)">✏️ Editar Equipes</h3>

            <div class="edit-equipes-lista" id="editar-equipes-lista">
                <!-- Gerado via JS -->
            </div>

            <div style="display:flex;gap:12px;justify-content:flex-end">
                <button class="btn-ninguem" onclick="fecharModais()" style="padding:14px 24px">Cancelar</button>
                <button class="btn-revelar" onclick="salvarEdicaoEquipes()"
                    style="margin-bottom:0;padding:14px 24px">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════
     MODAL — CARTA REGULAR
════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-carta">
        <div class="modal-box">
            <div class="modal-badge" id="modal-badge">⭐ 100 pts</div>
            <img id="modal-img" class="modal-img" src="" alt="" style="display:none">
            <div class="modal-pergunta" id="modal-pergunta"></div>
            <button class="btn-revelar" id="btn-revelar" onclick="revelarResposta()">👁 Revelar Resposta</button>
            <div class="modal-resposta-box" id="modal-resposta-box">
                <div class="modal-resposta-label">Resposta Esperada</div>
                <div class="modal-resposta" id="modal-resposta"></div>
            </div>
            <div class="botoes-equipes" id="botoes-equipes"></div>
        </div>
    </div>

    <!-- ════════════════════════════════════════
     MODAL — CORINGA
════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-coringa">
        <div class="modal-box coringa-box">
            <div class="coringa-icone" id="cor-icone"></div>
            <div class="coringa-title">🃏 Carta Coringa!</div>
            <div class="coringa-desc" id="cor-desc"></div>

            <!-- Passo 1: quem puxou (automatico via turno) -->
            <div id="cor-step-1"></div>

            <!-- Passo 2: alvo (se necessário) -->
            <div id="cor-step-2" style="display:none">
                <div class="modal-divider"></div>
                <div class="coringa-step-title">Escolha a equipe que sofrerá o efeito</div>
                <div class="coringa-team-btns" id="cor-btns-alvo"></div>
            </div>

            <!-- Confirmar -->
            <button class="btn-confirmar" id="cor-btn-confirmar" disabled onclick="confirmarCoringa()">
                ✓ Confirmar Ação
            </button>
        </div>
    </div>

    <script>
        // ── Dados do Django ────────────────────────────
        const CARTAS_REGULARES = {{ cartas_json| safe }};
        const CORINGAS_POOL = {{ coringas_json| safe }};
        const BARALHO_ID = {{ baralho.id }};
        const CSRF_TOKEN = '{{ csrf_token }}';
    </script>
    <script src="{% static 'js/jogo.js' %}"></script>
</body>

</html>
