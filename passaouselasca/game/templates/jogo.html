<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passa ou Se Lasca — Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #fff7ed;
            --surface: #fff;
            --primary: #f97316;
            --primary-light: rgba(249, 115, 22, .08);
            --primary-mid: rgba(249, 115, 22, .15);
            --secondary: #22c55e;
            --text: #1e1b4b;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
            --gold-light: rgba(245, 158, 11, .1);
            --shadow: 0 8px 30px rgba(249, 115, 22, .12);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        /* ════════════════════════════════════════════
           TELA 0 — SETUP
        ════════════════════════════════════════════ */
        #screen-setup {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .setup-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow)
        }

        .setup-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center
        }

        .setup-logo-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .setup-logo strong {
            font-size: 22px;
            font-weight: 900;
            color: var(--primary)
        }

        .setup-deck {
            text-align: center;
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 40px;
            background: var(--bg);
            padding: 12px;
            border-radius: 12px
        }

        .setup-deck span {
            font-weight: 800;
            color: var(--text)
        }

        .setup-section {
            margin-bottom: 32px
        }

        .setup-section h3 {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .setup-section h3::before {
            content: '1';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            font-size: 13px
        }

        #step-1 h3::before {
            content: '2'
        }

        #step-2 h3::before {
            content: '3'
        }

        /* Seletor de número de equipes */
        .n-selector {
            display: flex;
            gap: 10px
        }

        .n-btn {
            flex: 1;
            padding: 16px 8px;
            border-radius: 12px;
            background: var(--bg);
            border: 2px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            transition: all .2s;
            text-align: center
        }

        .n-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, .1)
        }

        .n-btn.selected {
            border-color: var(--primary);
            color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        /* Botão de equipe indisponível */
        .n-btn.unavail {
            opacity: .3;
            cursor: not-allowed;
            pointer-events: none;
            border-style: dashed
        }

        /* ── SELETOR DE MODO ─────────────────────────────────── */
        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 20px 12px;
            border-radius: 14px;
            background: var(--bg);
            border: 2px solid var(--border);
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all .2s;
            text-align: center;
            width: 100%
        }

        .mode-btn .mode-icon { font-size: 28px }

        .mode-btn .mode-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text)
        }

        .mode-btn .mode-desc {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            line-height: 1.4
        }

        .mode-btn:hover {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, .1)
        }

        .mode-btn.selected {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        .mode-btn.selected .mode-title { color: var(--primary) }

        /* Inputs de nomes de equipes */
        .team-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .team-input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 6px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            transition: border-color .2s
        }

        .team-input-row:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light)
        }

        .team-color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: 10px;
            background: var(--primary)
        }

        .team-input-row input {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            outline: none;
        }

        /* Botão iniciar */
        .btn-iniciar {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(249, 115, 22, .3);
            transition: all .2s;
            margin-top: 10px
        }

        .btn-iniciar:hover {
            opacity: .9;
            transform: translateY(-2px)
        }

        .btn-iniciar:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        /* ════════════════════════════════════════════
           TELA 1 — JOGO
        ════════════════════════════════════════════ */
        #screen-game {
            display: none;
            height: 100vh;
            flex-direction: column;
            overflow: hidden
        }

        /* TOPBAR (Laranja) */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            background: var(--primary);
            padding: 12px 24px;
            min-height: 80px;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 4px 12px rgba(249, 115, 22, .15);
        }

        .btn-topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .3);
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0
        }

        .btn-topbar:hover {
            background: rgba(255, 255, 255, .25);
            border-color: white;
        }

        .topbar-teams {
            display: flex;
            gap: 12px;
            flex: 1;
            flex-wrap: wrap;
            justify-content: center
        }

        /* Placar equipe unificado (Mesma cor) */
        .equipe-placar {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 24px;
            border-radius: 12px;
            border: 2px solid transparent;
            min-width: 110px;
            opacity: 0.6;
            transform: scale(0.92);
            transition: all 0.4s cubic-bezier(.22, 1, .36, 1);
            background: rgba(255, 255, 255, .1);
            color: white;
        }

        .equipe-placar.ativo {
            opacity: 1;
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .15);
            border-color: white;
            background: rgba(255, 255, 255, .25);
            z-index: 10;
        }

        .equipe-nome {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
            color: rgba(255, 255, 255, .9)
        }

        .equipe-pontos {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            line-height: 1;
            color: white
        }

        /* Animação de ponto */
        @keyframes pontoUp {
            0% {
                transform: scale(1.6);
                color: #10b981;
                text-shadow: 0 0 20px rgba(16, 185, 129, .6)
            }

            50% {
                transform: scale(1.15)
            }

            100% {
                transform: scale(1);
                text-shadow: none;
                color: white
            }
        }

        @keyframes pontoDown {
            0% {
                transform: scale(1.4);
                color: #ef4444
            }

            100% {
                transform: scale(1);
                color: white
            }
        }

        .pts-up {
            animation: pontoUp .6s cubic-bezier(.22, 1, .36, 1) forwards
        }

        .pts-down {
            animation: pontoDown .5s cubic-bezier(.22, 1, .36, 1) forwards
        }

        /* Partículas */
        @keyframes particle {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0)
            }
        }

        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: particle .7s ease-out forwards;
            z-index: 9999
        }

        /* MESA */
        .mesa {
            padding: 40px;
            display: grid;
            gap: 16px;
            flex: 1;
        }

        /* Carta regular (Fundo verde, numero branco) */
        .carta-numero {
            width: 100%;
            height: 100%;
            cursor: pointer;
            background: var(--secondary);
            border: none;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 48px;
            font-weight: 900;
            color: white;
            transition: transform .2s, border-color .2s, box-shadow .2s;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
            position: relative;
            overflow: hidden;
            user-select: none
        }

        .carta-numero:hover {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 12px 30px rgba(34, 197, 94, .4)
        }

        .carta-numero:active {
            transform: translateY(-2px) scale(1.01)
        }

        .carta-pts-label {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, .9);
            background: rgba(0, 0, 0, .15);
            padding: 4px 12px;
            border-radius: 999px
        }

        .carta-numero.respondida {
            opacity: .3;
            pointer-events: none;
            transform: none;
            box-shadow: none;
            background: rgba(34, 197, 94, .4);
            color: rgba(255, 255, 255, .6)
        }

        .carta-numero.respondida .carta-pts-label {
            background: rgba(0, 0, 0, .1);
            color: rgba(255, 255, 255, .4)
        }

        /* ════════════════════════════════════════════
           MODAL GERAL
        ════════════════════════════════════════════ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30, 27, 75, .6);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .modal-overlay.open {
            display: flex
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 48px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0, 0, 0, .3);
            animation: modalIn .3s cubic-bezier(.22, 1, .36, 1)
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.9) translateY(24px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        /* Modal Editar Equipes */
        .edit-equipes-lista {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
            text-align: left
        }

        .edit-row {
            display: flex;
            gap: 12px;
            align-items: center;
            background: var(--bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border)
        }

        .edit-row input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 15px;
            outline: none;
            transition: border-color .2s
        }

        .edit-row input:focus {
            border-color: var(--primary)
        }

        .edit-nome {
            flex: 1
        }

        .edit-pts {
            width: 90px;
            text-align: center
        }

        /* ════════════════════════════════════════════
           MODAL CARTA REGULAR
        ════════════════════════════════════════════ */
        .modal-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 999px;
            background: var(--primary-light);
            color: var(--primary);
            border: 2px solid var(--primary-mid);
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 24px
        }

        .modal-pergunta {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 24px;
            color: var(--text)
        }

        .modal-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            object-fit: contain
        }

        .modal-resposta-box {
            display: none;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            background: rgba(16, 185, 129, .08);
            border: 2px solid rgba(16, 185, 129, .2)
        }

        .modal-resposta-label {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--success);
            margin-bottom: 8px
        }

        .modal-resposta {
            font-size: 24px;
            font-weight: 800;
            color: var(--text)
        }

        .btn-revelar {
            padding: 16px 40px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(249, 115, 22, .3);
            transition: all .2s;
            margin-bottom: 12px
        }

        .btn-revelar:hover {
            opacity: .9;
            transform: translateY(-2px)
        }

        .botoes-equipes {
            display: none;
            flex-direction: column;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
            width: 100%;
        }

        .btn-resposta {
            padding: 14px 24px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
            border: 2px solid transparent;
            flex: 1;
        }

        .btn-resposta.certo { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .btn-resposta.certo:hover { background: #10b981; color: white; }
        
        .btn-resposta.errado { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .btn-resposta.errado:hover { background: #ef4444; color: white; }
        
        .btn-resposta.passou { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }
        .btn-resposta.passou:hover { background: #f59e0b; color: white; }

        .btn-pass-action {
            padding: 10px 16px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            border: none;
        }
        .btn-pass-acertou { background: #10b981; color: white; }
        .btn-pass-acertou:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .btn-pass-errou { background: #ef4444; color: white; }
        .btn-pass-errou:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-pass-ninguem { background: var(--border); color: var(--text-muted); padding: 12px; margin-top: 12px; width: 100%; border-radius: 8px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; border: none; cursor: pointer; transition: all .2s; }
        .btn-pass-ninguem:hover { background: var(--text-muted); color: white; }

        .btn-ninguem {
            padding: 14px 24px;
            border-radius: 12px;
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s
        }

        .btn-ninguem:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: white
        }

        /* ════════════════════════════════════════════
           MODAL CORINGA
        ════════════════════════════════════════════ */
        .coringa-box {
            border-top: 8px solid var(--gold)
        }

        .coringa-icone {
            font-size: 64px;
            margin-bottom: 16px
        }

        .coringa-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px
        }

        .coringa-desc {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 32px;
            line-height: 1.4
        }

        .coringa-step-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px
        }

        .coringa-team-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px
        }

        .btn-team-sel {
            padding: 14px 24px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-muted);
            cursor: pointer;
            transition: all .2s
        }

        .btn-team-sel:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, .1)
        }

        .btn-team-sel.sel {
            border-color: var(--primary);
            color: white;
            background: var(--primary);
            box-shadow: 0 6px 20px rgba(249, 115, 22, .3);
            transform: scale(1.05)
        }

        .btn-confirmar {
            padding: 16px 40px;
            background: #f59e0b;
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(245, 158, 11, .3);
            transition: all .2s
        }

        .btn-confirmar:hover {
            opacity: .9;
            transform: translateY(-2px)
        }

        .btn-confirmar:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        /* Separador */
        .modal-divider {
            height: 2px;
            background: var(--border);
            margin: 24px 0
        }
    </style>
</head>

<body>

    <!-- ════════════════════════════════════════
     TELA 0 — SETUP
════════════════════════════════════════ -->
    <div id="screen-setup">
        <div class="setup-card">
            <div class="setup-logo">
                <div class="setup-logo-icon">🃏</div>
                <strong>Passa ou Se Lasca</strong>
            </div>
            <div class="setup-deck">Preparando baralho: <span>{{ baralho.titulo }}</span></div>

            <!-- STEP 0: Modo de Jogo -->
            <div class="setup-section" id="step-0">
                <h3>Modo de Jogo</h3>
                <div class="mode-selector">
                    <button class="mode-btn" id="btn-modo-caos" onclick="selecionarModo('caos')">
                        <span class="mode-icon">🃏</span>
                        <span class="mode-title">Modo Caos</span>
                        <span class="mode-desc">Cartas normais + coringas (~30% coringas)</span>
                    </button>
                    <button class="mode-btn" id="btn-modo-normal" onclick="selecionarModo('normal')">
                        <span class="mode-icon">📋</span>
                        <span class="mode-title">Modo Normal</span>
                        <span class="mode-desc">Apenas cartas normais, sem coringas</span>
                    </button>
                </div>
            </div>

            <!-- STEP 1: Quantidade de equipes -->
            <div class="setup-section" id="step-1">
                <h3>Quantas equipes vão jogar?</h3>
                <div class="n-selector">
                    <button class="n-btn" data-n="2" onclick="selecionarN(2)">2</button>
                    <button class="n-btn" data-n="3" onclick="selecionarN(3)">3</button>
                    <button class="n-btn" data-n="4" onclick="selecionarN(4)">4</button>
                    <button class="n-btn" data-n="5" onclick="selecionarN(5)">5</button>
                    <button class="n-btn" data-n="6" onclick="selecionarN(6)">6</button>
                </div>
                <div id="qtd-cartas-info"
                    style="margin-top: 16px; font-size: 15px; font-weight: 600; color: var(--text-muted); background: white; padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); display: flex; align-items: center; gap: 8px;">
                    <!-- Preenchido via JS -->
                </div>
            </div>

            <div class="setup-section" id="step-2">
                <h3>Defina o nome das equipes</h3>
                <div class="team-inputs" id="team-inputs">
                    <!-- gerado por JS -->
                </div>
            </div>

            <button class="btn-iniciar" id="btn-iniciar" onclick="iniciarJogo()" disabled>
                ▶ Começar Partida
            </button>
        </div>
    </div>

    <!-- ════════════════════════════════════════
     TELA 1 — JOGO
════════════════════════════════════════ -->
    <div id="screen-game" style="display:none;flex-direction:column">

        <div class="topbar" id="topbar">
            <button class="btn-topbar" data-url="{% url 'home' %}" onclick="tentarEncerrar(this)">✕ Encerrar</button>
            <div class="topbar-teams" id="topbar-teams"></div>
            <button class="btn-topbar" onclick="abrirModalEditarEquipes()">✏️ Editar Equipes</button>
        </div>

        <div class="mesa" id="mesa"></div>

    </div>

    <!-- ════════════════════════════════════════
     MODAL — EDITAR EQUIPES
════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-editar">
        <div class="modal-box" style="max-width:500px">
            <h3 style="font-size:24px;font-weight:900;margin-bottom:24px;color:var(--text)">✏️ Editar Equipes</h3>

            <div class="edit-equipes-lista" id="editar-equipes-lista">
                <!-- Gerado via JS -->
            </div>

            <div style="display:flex;gap:12px;justify-content:flex-end">
                <button class="btn-ninguem" onclick="fecharModais()" style="padding:14px 24px">Cancelar</button>
                <button class="btn-revelar" onclick="salvarEdicaoEquipes()"
                    style="margin-bottom:0;padding:14px 24px">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════
     MODAL — CARTA REGULAR
════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-carta">
        <div class="modal-box">
            <div class="modal-badge" id="modal-badge">⭐ 100 pts</div>
            <img id="modal-img" class="modal-img" src="" alt="" style="display:none">
            <div class="modal-pergunta" id="modal-pergunta"></div>
            <button class="btn-revelar" id="btn-revelar" onclick="revelarResposta()">👁 Revelar Resposta</button>
            <div class="modal-resposta-box" id="modal-resposta-box">
                <div class="modal-resposta-label">Resposta Esperada</div>
                <div class="modal-resposta" id="modal-resposta"></div>
            </div>
            <div class="botoes-equipes" id="botoes-equipes"></div>
        </div>
    </div>

    <!-- ════════════════════════════════════════
     MODAL — CORINGA
════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-coringa">
        <div class="modal-box coringa-box">
            <div class="coringa-icone" id="cor-icone"></div>
            <div class="coringa-title">🃏 Carta Coringa!</div>
            <div class="coringa-desc" id="cor-desc"></div>

            <!-- Passo 1: quem puxou (automatico via turno) -->
            <div id="cor-step-1"></div>

            <!-- Passo 2: alvo (se necessário) -->
            <div id="cor-step-2" style="display:none">
                <div class="modal-divider"></div>
                <div class="coringa-step-title">Escolha a equipe que sofrerá o efeito</div>
                <div class="coringa-team-btns" id="cor-btns-alvo"></div>
            </div>

            <!-- Confirmar -->
            <button class="btn-confirmar" id="cor-btn-confirmar" disabled onclick="confirmarCoringa()">
                ✓ Confirmar Ação
            </button>
        </div>
    </div>

    <script>
        // ── Dados do Django ────────────────────────────
        const CARTAS_REGULARES = {{ cartas_json| safe }};
        const CORINGAS_POOL = {{ coringas_json| safe }};
        const BARALHO_ID = {{ baralho.id }};
        const CSRF_TOKEN = '{{ csrf_token }}';

        // ── Estado global ──────────────────────────────
        let equipes = [];
        let deck = [];
        let cartaAbertaIdx = null;
        let nEquipesSel = null;
        let turnoAtual = 0;

        // Estado do modal coringa
        let corAtualIdx = null;
        let corAlvoIdx = null;

        // ── SETUP ──────────────────────────────────────

        // ── MODO DE JOGO ───────────────────────────────
        let modoJogo = 'caos'; // default

        /**
         * Retorna { nNormal, nJokers, total } para exibição na UI.
         * Sem randomness — apenas contagens.
         */
        function calcDeckCount(n, modo) {
            const nReg = CARTAS_REGULARES.length;
            if (modo === 'normal') {
                const total = Math.floor(nReg / n) * n;
                return { nNormal: total, nJokers: 0, total };
            }
            // Modo Caos: ~70% normal / ~30% coringas
            const targetJokers = Math.round(nReg * 30 / 70);
            const rawTotal = nReg + targetJokers;
            const total = Math.ceil(rawTotal / n) * n;
            const nJokers = total - nReg; // always >= 0 (ceil guarantees total >= rawTotal >= nReg)
            return { nNormal: nReg, nJokers, total };
        }

        /**
         * Constrói e retorna o deck embaralhado para a partida.
         */
        function buildDeck(n, modo) {
            const { nNormal, nJokers } = calcDeckCount(n, modo);
            // Shuffle normal cards first (use all or slice for Normal mode)
            const shuffledReg = [...CARTAS_REGULARES].sort(() => Math.random() - 0.5);
            const built = shuffledReg.slice(0, nNormal).map(c => ({ ...c, isCoringa: false }));
            for (let i = 0; i < nJokers; i++) {
                const c = CORINGAS_POOL[Math.floor(Math.random() * CORINGAS_POOL.length)];
                built.push({ ...c, isCoringa: true });
            }
            // Fisher-Yates shuffle
            for (let i = built.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [built[i], built[j]] = [built[j], built[i]];
            }
            return built;
        }

        /**
         * Atualiza o estado enabled/disabled dos botões de nº de equipes
         * com base no modo atual (garante pelo menos 2 rodadas por equipe).
         */
        function atualizarBotoesEquipe() {
            for (let n = 2; n <= 6; n++) {
                const { total } = calcDeckCount(n, modoJogo);
                const valid = total > 0 && (total / n) >= 2;
                const btn = document.querySelector(`[data-n="${n}"]`);
                if (!btn) continue;
                btn.disabled = !valid;
                btn.classList.toggle('unavail', !valid);
                // Se a seleção atual ficou inválida, limpar
                if (!valid && nEquipesSel === n) {
                    nEquipesSel = null;
                    document.getElementById('btn-iniciar').disabled = true;
                    document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('selected'));
                    document.getElementById('team-inputs').innerHTML = '';
                    document.getElementById('qtd-cartas-info').innerHTML = '';
                }
            }
        }

        function selecionarModo(modo) {
            modoJogo = modo;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn-modo-' + modo).classList.add('selected');
            atualizarBotoesEquipe();
            // Atualizar painel de info se já há equipes selecionadas
            if (nEquipesSel) selecionarN(nEquipesSel);
        }

        function selecionarN(n) {
            const btn = document.querySelector(`[data-n="${n}"]`);
            if (!btn || btn.disabled) return;
            nEquipesSel = n;
            document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            // Renderizar inputs de nome
            const container = document.getElementById('team-inputs');
            container.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const row = document.createElement('div');
                row.className = 'team-input-row';
                row.innerHTML = `
            <div class="team-color-dot"></div>
            <input type="text" id="equipe-nome-${i}" placeholder="Nome da Equipe ${i + 1}" value="Equipe ${i + 1}">
        `;
                container.appendChild(row);
            }
            document.getElementById('btn-iniciar').disabled = false;

            // Painel de informações
            const { nNormal, nJokers, total } = calcDeckCount(n, modoJogo);
            const infoEl = document.getElementById('qtd-cartas-info');
            if (modoJogo === 'caos') {
                const pct = total > 0 ? Math.round(nJokers / total * 100) : 0;
                infoEl.innerHTML = `
            <span>ℹ️</span>
            <div>O jogo terá <strong style="color:var(--text)">${total} cartas</strong> — <span style="color:var(--secondary);font-weight:700">${nNormal} normais</span> + <span style="color:var(--gold);font-weight:700">${nJokers} coringas</span> (${pct}%).</div>
        `;
            } else {
                const ignored = CARTAS_REGULARES.length - nNormal;
                infoEl.innerHTML = `
            <span>ℹ️</span>
            <div>O jogo terá <strong style="color:var(--text)">${total} cartas</strong> normais${ignored > 0 ? `, ${ignored} carta${ignored > 1 ? 's' : ''} ignorada${ignored > 1 ? 's' : ''} para divisão igual` : ''}. Sem coringas.</div>
        `;
            }
        }

        // Inicializar: modo Caos por padrão, depois selecionar 2 equipes
        selecionarModo('caos');
        selecionarN(2);

        function iniciarJogo() {
            equipes = [];
            turnoAtual = 0;

            for (let i = 0; i < nEquipesSel; i++) {
                const nome = document.getElementById(`equipe-nome-${i}`).value.trim() || `Equipe ${i + 1}`;
                equipes.push({ nome, pontos: 0 });
            }

            deck = buildDeck(nEquipesSel, modoJogo);

            renderMesa();
            renderTopbar();
            document.getElementById('screen-setup').style.display = 'none';
            document.getElementById('screen-game').style.display = 'flex';
        }

        // ── RENDER JOGO ────────────────────────────────

        function renderTopbar() {
            const tt = document.getElementById('topbar-teams');
            tt.innerHTML = equipes.map((e, i) => `
        <div class="equipe-placar ${i === turnoAtual ? 'ativo' : ''}" id="placar-${i}">
            <div class="equipe-nome">${e.nome}</div>
            <div class="equipe-pontos" id="pontos-${i}">${e.pontos}</div>
        </div>
    `).join('');
        }

        function renderMesa() {
            const mesa = document.getElementById('mesa');

            const n = deck.length;
            if (n > 0) {
                let windowRatio = window.innerWidth / (window.innerHeight - 100); // 100 is approx topbar + padding
                let rows = Math.round(Math.sqrt(n / windowRatio));
                if (rows < 1) rows = 1;
                let cols = Math.ceil(n / rows);

                mesa.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                mesa.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            }

            mesa.innerHTML = deck.map((carta, i) => {
                return `
            <div class="carta-numero" id="card-${i}" onclick="clicarCarta(${i})">
                <span>${i + 1}</span>
            </div>`;
            }).join('');
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('screen-game').style.display === 'flex') {
                renderMesa();
            }
        });

        // ── EDITAR EQUIPES ─────────────────────────────

        function abrirModalEditarEquipes() {
            const lista = document.getElementById('editar-equipes-lista');
            lista.innerHTML = equipes.map((e, i) => `
        <div class="edit-row">
            <input type="text" id="edit-nome-${i}" value="${e.nome}" class="edit-nome">
            <input type="number" id="edit-pts-${i}" value="${e.pontos}" class="edit-pts">
            <span style="font-size:13px;color:var(--text-muted);font-weight:700">pts</span>
        </div>
    `).join('');
            document.getElementById('modal-editar').classList.add('open');
        }

        function salvarEdicaoEquipes() {
            equipes.forEach((e, i) => {
                const novoNome = document.getElementById(`edit-nome-${i}`).value.trim();
                const novosPts = parseInt(document.getElementById(`edit-pts-${i}`).value);
                if (novoNome) e.nome = novoNome;
                if (!isNaN(novosPts)) e.pontos = novosPts;
            });
            renderTopbar(); // Atualiza a topbar com novos nomes e pontos mantendo o turno visual intacto
            fecharModais();
        }

        // ── FLUXO DE TURNO ─────────────────────────────

        function avancarTurno() {
            const placarAntigo = document.getElementById(`placar-${turnoAtual}`);
            if (placarAntigo) placarAntigo.classList.remove('ativo');

            turnoAtual = (turnoAtual + 1) % equipes.length;

            const placarNovo = document.getElementById(`placar-${turnoAtual}`);
            if (placarNovo) placarNovo.classList.add('ativo');
        }

        function finalizarCarta() {
            marcarRespondida(cartaAbertaIdx);
            fecharModais();
            
            const respondidas = document.querySelectorAll('.carta-numero.respondida').length;
            if (respondidas === deck.length) {
                setTimeout(mostrarVencedor, 500);
                return;
            }

            avancarTurno();
        }

        function mostrarVencedor() {
            let maxPts = -Infinity;
            let vencedores = [];
            equipes.forEach(e => {
                if (e.pontos > maxPts) {
                    maxPts = e.pontos;
                    vencedores = [e];
                } else if (e.pontos === maxPts) {
                    vencedores.push(e);
                }
            });

            // ── Salvar partida no servidor (silencioso) ─────────────────
            fetch('/api/partida/salvar/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': CSRF_TOKEN,
                },
                body: JSON.stringify({
                    baralho_id: BARALHO_ID,
                    equipes: equipes.map(e => ({ nome: e.nome, pontos: e.pontos })),
                }),
            }).catch(() => {}); // não bloqueia em caso de falha

            let html = '';
            if (vencedores.length === 1) {
                html = `
                    <div style="font-size:80px; margin-bottom:20px;">🏆</div>
                    <div style="font-size:24px; font-weight:800; color:var(--text-muted); margin-bottom:12px;">Fim de Jogo! A equipe vencedora é:</div>
                    <div style="font-size:48px; font-weight:900; color:var(--primary); margin-bottom:8px;">${vencedores[0].nome}</div>
                    <div style="font-size:20px; font-weight:700; color:var(--success); margin-bottom:32px;">Com ${maxPts} pontos!</div>
                `;
            } else {
                html = `
                    <div style="font-size:80px; margin-bottom:20px;">🤝</div>
                    <div style="font-size:24px; font-weight:800; color:var(--text-muted); margin-bottom:12px;">Fim de Jogo! Temos um empate entre:</div>
                    <div style="font-size:36px; font-weight:900; color:var(--primary); margin-bottom:8px;">${vencedores.map(v => v.nome).join(' e ')}</div>
                    <div style="font-size:20px; font-weight:700; color:var(--success); margin-bottom:32px;">Ambas com ${maxPts} pontos!</div>
                `;
            }
            
            const btnTopbar = document.querySelector('.btn-topbar');
            const homeUrl = btnTopbar ? btnTopbar.dataset.url : '/';
            html += `
                <div style="display:flex; gap:12px; justify-content:center; margin-top:24px;">
                    <button class="btn-ninguem" onclick="this.closest('.modal-overlay').remove()">Continuar no Jogo</button>
                    <a href="${homeUrl}" class="btn-revelar" style="margin-bottom:0; text-decoration:none; display:inline-block; padding:14px 24px;">Encerrar Partida</a>
                </div>
            `;

            const div = document.createElement('div');
            div.className = 'modal-overlay open';
            div.innerHTML = `
                <div class="modal-box" style="border-top:8px solid var(--primary); transform:none; animation:none; max-width:600px;">
                    ${html}
                </div>
            `;
            document.body.appendChild(div);
            
            // Lançar um pouco de confete/partículas na tela
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const ang = Math.random() * Math.PI * 2;
                    const dist = 50 + Math.random() * 200;
                    p.style.setProperty('--tx', Math.cos(ang) * dist + 'px');
                    p.style.setProperty('--ty', Math.sin(ang) * dist + 'px');
                    p.style.left = cx + 'px';
                    p.style.top = cy + 'px';
                    p.style.background = ['#f97316','#22c55e','#f59e0b','#ec4899'][Math.floor(Math.random()*4)];
                    p.style.animationDelay = '0s';
                    p.style.animationDuration = '1.5s';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1500);
                }, i * 50);
            }
        }

        function tentarEncerrar(btn) {
            const respondidas = document.querySelectorAll('.carta-numero.respondida').length;
            if (respondidas === deck.length && deck.length > 0) {
                mostrarVencedor();
            } else {
                window.location.href = btn.dataset.url;
            }
        }

        // ── CLICK NA CARTA ─────────────────────────────

        function clicarCarta(idx) {
            cartaAbertaIdx = idx;
            const carta = deck[idx];
            carta.isCoringa ? abrirModalCoringa(carta) : abrirModalCarta(carta);
        }

        // ── MODAL CARTA REGULAR ────────────────────────

        function abrirModalCarta(carta) {
            document.getElementById('modal-badge').textContent = `⭐ Valendo ${carta.pontos} pontos!`;
            document.getElementById('modal-pergunta').textContent = carta.pergunta;
            document.getElementById('modal-resposta').textContent = carta.resposta;

            const img = document.getElementById('modal-img');
            if (carta.imagem) { img.src = carta.imagem; img.style.display = 'block'; }
            else { img.style.display = 'none'; }

            document.getElementById('modal-resposta-box').style.display = 'none';
            document.getElementById('botoes-equipes').style.display = 'none';
            document.getElementById('btn-revelar').style.display = 'inline-block';

            document.getElementById('modal-carta').classList.add('open');
        }

        function revelarResposta() {
            document.getElementById('btn-revelar').style.display = 'none';
            document.getElementById('modal-resposta-box').style.display = 'block';

            const box = document.getElementById('botoes-equipes');
            const eAtual = equipes[turnoAtual];

            let html = `
        <div style="display:flex; justify-content:center; gap:16px; margin-top:24px; width:100%;">
            <button class="btn-resposta certo" onclick="pontuar(${turnoAtual})">✔️ Certo</button>
            <button class="btn-resposta errado" onclick="ninguemPontua()">❌ Errado</button>
            <button class="btn-resposta passou" onclick="abrirPainelPassou()">⏭️ Passou</button>
        </div>
    `;

            box.innerHTML = html;
            box.style.display = 'flex';
        }

        function abrirPainelPassou() {
            const box = document.getElementById('botoes-equipes');
            const eAtual = equipes[turnoAtual];
            let html = `
        <div style="background:var(--bg); padding:20px; border-radius:12px; border:1px solid var(--border); margin-top:12px; text-align:left; width:100%;">
            <div style="margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--border);">
                <span style="font-size:14px; color:var(--text-muted); font-weight:700;">Equipe da vez (que passou):</span><br>
                <span style="font-size:20px; font-weight:900; color:var(--primary);">${eAtual.nome}</span>
            </div>
            <div style="font-size:14px; font-weight:800; color:var(--text-muted); margin-bottom:12px; text-transform:uppercase;">Selecione a equipe que respondeu:</div>
            <div style="display:flex; flex-direction:column; gap:12px;">
    `;
            
            equipes.forEach((e, i) => {
                if (i === turnoAtual) return;
                html += `
            <div style="display:flex; align-items:center; justify-content:space-between; background:white; padding:12px; border-radius:8px; border:1px solid var(--border);">
                <strong style="font-size:16px; color:var(--text);">${e.nome}</strong>
                <div style="display:flex; gap:8px;">
                    <button class="btn-pass-action btn-pass-acertou" onclick="passouAcertou(${i})">Acertou</button>
                    <button class="btn-pass-action btn-pass-errou" onclick="passouErrou()">Errou</button>
                </div>
            </div>
        `;
            });

            html += `
            </div>
            <button class="btn-pass-action btn-pass-ninguem" onclick="ninguemPontua()">Ninguém respondeu / Pular</button>
        </div>
    `;
            box.innerHTML = html;
        }

        function passouAcertou(equipeAcertouIdx) {
            const ptsCarta = deck[cartaAbertaIdx].pontos;
            // Equipe que acertou ganha
            equipes[equipeAcertouIdx].pontos += ptsCarta;
            atualizarPlacar(equipeAcertouIdx, true);
            
            // Equipe da vez perde 5
            equipes[turnoAtual].pontos = Math.max(0, equipes[turnoAtual].pontos - 5);
            atualizarPlacar(turnoAtual, false);
            
            finalizarCarta();
        }

        function passouErrou() {
            const ptsCarta = deck[cartaAbertaIdx].pontos;
            // Equipe da vez ganha
            equipes[turnoAtual].pontos += ptsCarta;
            atualizarPlacar(turnoAtual, true);
            
            finalizarCarta();
        }

        function pontuar(equipeIdx) {
            const pontos = deck[cartaAbertaIdx].pontos;
            equipes[equipeIdx].pontos += pontos;
            atualizarPlacar(equipeIdx, true);
            finalizarCarta();
        }

        function ninguemPontua() {
            finalizarCarta();
        }

        // ── MODAL CORINGA ──────────────────────────────

        function abrirModalCoringa(carta) {
            corAtualIdx = turnoAtual;
            corAlvoIdx = null;

            document.getElementById('cor-icone').textContent = carta.icone;
            document.getElementById('cor-desc').textContent = carta.descricao;

            const eAtual = equipes[turnoAtual];
            document.getElementById('cor-step-1').innerHTML = `
        <div class="coringa-step-title">Equipe Sorteada</div>
        <div style="font-size:24px; font-weight:900; color:var(--primary); margin-bottom:24px;">
            ${eAtual.nome}
        </div>
    `;

            if (carta.precisa_alvo) {
                document.getElementById('cor-step-2').style.display = 'block';
                const b2 = document.getElementById('cor-btns-alvo');
                b2.innerHTML = equipes.map((e, i) => {
                    if (i === turnoAtual) return '';
                    return `<button class="btn-team-sel" onclick="selecionarAlvo(${i})">${e.nome}</button>`;
                }).join('');
                document.getElementById('cor-btn-confirmar').disabled = true;
            } else {
                document.getElementById('cor-step-2').style.display = 'none';
                document.getElementById('cor-btn-confirmar').disabled = false;
            }

            document.getElementById('modal-coringa').classList.add('open');
        }

        function selecionarAlvo(idx) {
            corAlvoIdx = idx;
            document.querySelectorAll('#cor-btns-alvo .btn-team-sel').forEach((b, i) => {
                b.classList.toggle('sel', parseInt(b.getAttribute('onclick').match(/\d+/)[0]) === idx);
            });
            document.getElementById('cor-btn-confirmar').disabled = false;
        }

        function confirmarCoringa() {
            const carta = deck[cartaAbertaIdx];
            aplicarCoringa(carta, corAtualIdx, corAlvoIdx);
            finalizarCarta();
        }

        // ── EFEITOS DOS CORINGAS ───────────────────────

        function aplicarCoringa(c, atualIdx, alvoIdx) {
            const atual = equipes[atualIdx];

            switch (c.tipo) {
                case 'roubar_pts': {
                    const val = alvoIdx !== null ? Math.min(c.valor, equipes[alvoIdx].pontos) : 0;
                    if (alvoIdx !== null) equipes[alvoIdx].pontos -= val;
                    atual.pontos += val;
                    atualizarPlacar(atualIdx, true);
                    if (alvoIdx !== null) atualizarPlacar(alvoIdx, false);
                    break;
                }
                case 'ganhar_pts':
                    atual.pontos += c.valor;
                    atualizarPlacar(atualIdx, true);
                    break;
                case 'perder_pts':
                    atual.pontos = Math.max(0, atual.pontos - c.valor);
                    atualizarPlacar(atualIdx, false);
                    break;
                case 'remover_pts':
                    if (alvoIdx !== null) equipes[alvoIdx].pontos = Math.max(0, equipes[alvoIdx].pontos - c.valor);
                    if (alvoIdx !== null) atualizarPlacar(alvoIdx, false);
                    break;
                case 'primeiro_lugar': {
                    const maxPts = Math.max(...equipes.map(e => e.pontos));
                    atual.pontos = maxPts + 5;
                    atualizarPlacar(atualIdx, true);
                    break;
                }
                case 'ultimo_lugar': {
                    const minPts = Math.min(...equipes.map(e => e.pontos));
                    atual.pontos = Math.max(0, minPts - 5);
                    atualizarPlacar(atualIdx, false);
                    break;
                }
                case 'trocar_pts': {
                    if (alvoIdx !== null) {
                        const tmp = atual.pontos;
                        atual.pontos = equipes[alvoIdx].pontos;
                        equipes[alvoIdx].pontos = tmp;
                        atualizarPlacar(atualIdx, true);
                        atualizarPlacar(alvoIdx, false);
                    }
                    break;
                }
                case 'dobrar_pts':
                    atual.pontos *= 2;
                    atualizarPlacar(atualIdx, true);
                    break;
                case 'metade_pts':
                    atual.pontos = Math.floor(atual.pontos / 2);
                    atualizarPlacar(atualIdx, false);
                    break;
            }
        }

        // ── ANIMAÇÕES ──────────────────────────────────

        function atualizarPlacar(idx, ganhou) {
            const el = document.getElementById(`pontos-${idx}`);
            if (!el) return;
            el.textContent = equipes[idx].pontos;
            el.classList.remove('pts-up', 'pts-down');
            void el.offsetWidth;
            el.classList.add(ganhou ? 'pts-up' : 'pts-down');

            if (ganhou) lancarParticulas(el);
        }

        function lancarParticulas(el) {
            const r = el.getBoundingClientRect();
            const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const ang = (i / 8) * Math.PI * 2;
                const dist = 36 + Math.random() * 48;
                p.style.setProperty('--tx', Math.cos(ang) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(ang) * dist + 'px');
                p.style.left = (cx - 4) + 'px';
                p.style.top = (cy - 4) + 'px';
                p.style.background = '#fff'; // Partículas brancas no fundo laranja
                p.style.animationDelay = (Math.random() * .1) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function marcarRespondida(idx) {
            const el = document.getElementById(`card-${idx}`);
            if (el) el.classList.add('respondida');
        }

        function fecharModais() {
            document.getElementById('modal-carta').classList.remove('open');
            document.getElementById('modal-coringa').classList.remove('open');
            document.getElementById('modal-editar').classList.remove('open');
            corAtualIdx = null; corAlvoIdx = null;
        }

        ['modal-carta', 'modal-coringa', 'modal-editar'].forEach(id => {
            document.getElementById(id).addEventListener('click', e => {
                if (e.target.id === id) fecharModais();
            });
        });
    </script>
</body>
